<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Rol</title>
    <style>
        /* Reset de estilos básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: block;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Estilo para Admin (Color primario) */
        .btn-admin {
            background-color: #4f46e5;
            color: white;
        }

        .btn-admin:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
        }

        /* Estilo para Usuario (Color secundario/claro) */
        .btn-user {
            background-color: #ffffff;
            color: #4f46e5;
            border: 2px solid #4f46e5;
        }

        .btn-user:hover {
            background-color: #f5f3ff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selecciona tu rol</h1>
        
        <div class="button-group">
            <a href="/admin_app/" class="btn btn-admin">Administrador</a>
            <a href="/user_app/" class="btn btn-user">Usuario</a>
        </div>
    </div>

</body>
</html>
